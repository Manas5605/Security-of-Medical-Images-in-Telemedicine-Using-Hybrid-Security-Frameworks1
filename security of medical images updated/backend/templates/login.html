<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
    <div class="login-container">
        <!-- Login Form -->
        <div id="loginForm">
            <h2 id="formTitle">Admin Login</h2>

            {% if error %}
            <div class="error">
                <p>{{ error }}</p>
            </div>
            {% endif %}

            <form method="POST" id="loginFormContent">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit">Login</button>
            </form>

            <p>Don't have an account? <a href="javascript:void(0);" id="showSignup">Sign up here</a></p>
        </div>

        <!-- Signup Form -->
        <div id="signupForm" style="display:none;">
            <h2 id="formTitle">Admin Signup</h2>

            <form method="POST" id="signupFormContent">
                <div class="input-group">
                    <label for="newUsername">Username</label>
                    <input type="text" id="newUsername" name="newUsername" required>
                </div>
                <div class="input-group">
                    <label for="newPassword">Password</label>
                    <input type="password" id="newPassword" name="newPassword" required>
                </div>
                <div class="input-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                </div>
                <button type="submit">Sign Up</button>
            </form>

            <p>Already have an account? <a href="javascript:void(0);" id="showLogin">Login here</a></p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
