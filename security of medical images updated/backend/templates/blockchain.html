<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blockchain Storage</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/blockchain.css') }}">
    <script src="{{ url_for('static', filename='js/blockchain.js') }}" defer></script>
</head>
<body>
    <div class="container">
        <h2>Blockchain Storage</h2>

        <div id="store-image-section">
            <h3>Step 1: Store Encrypted Image</h3>
            <button id="store-image-btn">Store Encrypted Image</button>
        </div>

        <div id="transaction-section" style="display:none;">
            <p>Your encrypted image has been successfully stored.</p>
            <img id="stored-image" alt="Stored Encrypted Image">
            <p><strong>Transaction Hash:</strong> <span id="transaction-hash"></span></p>
            <button id="view-stored-images-btn">View Stored Images</button>
        </div>

        <div id="stored-images-section" style="display:none;">
            <h3>Stored Images</h3>
            <div id="stored-images-container"></div>
            <br>
            <button id="back-btn">Back</button>
            <button id="go-to-watermarking-btn">Store Other Images</button>
        </div>
    </div>
</body>
</html>
